<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Omar's Professional CCM Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 40px 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 550px; border-top: 8px solid #1a73e8; }
        h2 { color: #1a73e8; font-size: 24px; margin-top: 0; margin-bottom: 25px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .section-title { display: block; font-weight: bold; margin-bottom: 10px; color: #5f6368; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .option-group { margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #eef0f2; }
        label { display: block; margin: 8px 0; cursor: pointer; font-size: 15px; color: #3c4043; transition: 0.2s; }
        input[type="radio"], input[type="checkbox"] { margin-right: 12px; transform: scale(1.2); cursor: pointer; }
        label:hover { color: #1a73e8; }
        
        .dme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        #result-area { margin-top: 25px; }
        textarea { width: 100%; height: 160px; padding: 15px; border: 2px solid #dadce0; border-radius: 10px; resize: none; font-family: inherit; box-sizing: border-box; background: #fffdeb; font-size: 14.5px; line-height: 1.6; color: #202124; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .copy-btn { background: #1a73e8; color: white; }
        .copy-btn:hover { background: #1557b0; box-shadow: 0 4px 12px rgba(26,115,232,0.3); }
        .clear-btn { background: #f1f3f4; color: #3c4043; }
        .clear-btn:hover { background: #e8eaed; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #323232; color: white; padding: 12px 30px; border-radius: 50px; display: none; z-index: 1000; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Support 🩺</h2>
    
    <div class="option-group">
        <span class="section-title">1. Ambulation & Falls</span>
        <label><input type="radio" name="walk" value="can" checked> Can walk</label>
        <label><input type="radio" name="walk" value="cant"> Can't walk </label>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <label><input type="radio" name="fall" value="no" checked> No Falls</label>
        <label><input type="radio" name="fall" value="yes"> Experience Falls</label>
    </div>

    <div class="option-group">
        <span class="section-title">2. DME Selection</span>
        <div class="dme-grid">
            <label><input type="checkbox" class="dme-item" value="walker"> Walker</label>
            <label><input type="checkbox" class="dme-item" value="cane"> Cane</label>
            <label><input type="checkbox" class="dme-item" value="manual wheelchair"> Manual Wheelchair</label>
            <label><input type="checkbox" class="dme-item" value="corrective lenses"> Corrective Lenses</label>
            <label><input type="checkbox" class="dme-item" value="hearing aid"> Hearing Aid</label>
            <label><input type="checkbox" class="dme-item" value="OTC reading glasses"> OTC Reading Glasses</label>
        </div>
    </div>

    <div id="result-area">
        <span class="section-title">Generated Note</span>
        <textarea id="outputField" readonly placeholder="Your clinical note will appear here..."></textarea>
        <div class="btn-group">
            <button class="copy-btn" onclick="generateAndCopy()">Generate & Copy Note</button>
            <button class="clear-btn" onclick="resetAll()">Reset All</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">Note copied to clipboard! ✅</div>

<script>
    const outputField = document.getElementById('outputField');
    const toast = document.getElementById('toast');

    function generateAndCopy() {
        // 1. منطق الحركة والوقوع
        const canWalk = document.querySelector('input[name="walk"]:checked').value === 'can';
        const doesFall = document.querySelector('input[name="fall"]:checked').value === 'yes';
        let ambulationPart = "";

        if (canWalk && doesFall) {
            ambulationPart = "Patient demonstrates independent ambulation at assessed distances, but fall risk is identified based on history of falls and medication use.";
        } else {
            let walkText = canWalk 
                ? "The patient has no difficulty with ambulation and moving around. They are able to walk without assistance" 
                : "The patient has significant difficulty with ambulation and moving around. They are not able to walk without assistance";

            let fallText = doesFall 
                ? "do experience falls and balance issues" 
                : "do not experience any falls or balance issues";

            ambulationPart = `${walkText} and ${fallText}.`;
        }

        // 2. منطق DME (مع مراعاة بداية الجملة بحرف كبير)
        const selectedDMEs = Array.from(document.querySelectorAll('.dme-item:checked')).map(el => el.value);
        let dmePart = "";

        if (selectedDMEs.length === 0) {
            dmePart = "The patient doesn't use any DME.";
        } else {
            let formattedList = "";
            if (selectedDMEs.length === 1) {
                formattedList = selectedDMEs[0];
            } else if (selectedDMEs.length === 2) {
                formattedList = selectedDMEs.join(" and ");
            } else {
                const lastItem = selectedDMEs.pop();
                formattedList = selectedDMEs.join(", ") + " and " + lastItem;
            }
            dmePart = `Patient uses DMEs such as: ${formattedList}.`;
        }

        // 3. الدمج مع فصل الفقرات بسطر جديد
        const finalNote = ambulationPart + "\n\n" + dmePart;
        outputField.value = finalNote;

        // نسخ تلقائي
        outputField.select();
        document.execCommand('copy');
        showToast();
    }

    function resetAll() {
        document.querySelector('input[name="walk"][value="can"]').checked = true;
        document.querySelector('input[name="fall"][value="no"]').checked = true;
        document.querySelectorAll('.dme-item').forEach(el => el.checked = false);
        outputField.value = '';
    }

    function showToast() {
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }
</script>

</body>
</html>
